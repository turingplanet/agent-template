# THE ANCHOR — this file's name (agent.manifest.yaml) + location (repo root) are the one
# hardcoded thing in the whole system. Every tool is guaranteed to find the manifest here.
#
# This is a RUNNABLE python-mcp starter. scaffolding with copier gives you a repo that passes
# review out of the box on the placeholder stubs. Replace the /api + /mcp + tests code with
# your own, and edit any values below that should differ for your agent.

apiVersion: v1
profile: python-mcp          # selects behavior from the platform-owned library

toolchain:
  language: python
  packageManager: poetry     # pip | poetry | uv   (the field Scenario B flips)

paths:
  api: ./api                 # business logic       (the fields Scenario A flips)
  mcp: ./mcp                 # MCP wrapper

commands:                    # the review flow runs EXACTLY these
  install: poetry install --no-root
  test:    poetry run pytest -q
  lint:    poetry run ruff check .
  security: poetry run bandit -q -r api
